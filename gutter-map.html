<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gutter Crew — Door Map</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --panel: rgba(15,23,42,0.96); --dark: #0f172a; }
  html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--dark); }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: var(--panel); border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 10px 12px; display: flex; align-items: center; gap: 8px;
    backdrop-filter: blur(12px); height: 54px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--green); letter-spacing: 1.5px; white-space: nowrap; }
  #search-box {
    flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; padding: 8px 11px; outline: none; transition: border-color 0.15s;
  }
  #search-box::placeholder { color: rgba(255,255,255,0.35); }
  #search-box:focus { border-color: var(--green); }
  #search-btn {
    background: var(--green); border: none; border-radius: 8px; color: #0f172a;
    font-weight: 700; font-size: 0.85rem; padding: 8px 12px; cursor: pointer; white-space: nowrap;
  }

  #map { position: fixed; top: 54px; left: 0; right: 0; bottom: 60px; z-index: 1; }

  #statsbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: var(--panel); border-top: 1px solid rgba(255,255,255,0.08);
    padding: 8px 20px; display: flex; justify-content: space-around;
    backdrop-filter: blur(12px); height: 60px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
  .stat .num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; line-height: 1; }
  .stat .lbl { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.4px; color: rgba(255,255,255,0.3); }
  .stat.sold .num { color: var(--green); }
  .stat.declined .num { color: var(--red); }
  .stat.noanswer .num { color: var(--yellow); }
  .stat.total .num { color: rgba(255,255,255,0.6); }

  /* POPUP */
  #popup {
    position: fixed; z-index: 3000; background: var(--panel);
    border: 1px solid rgba(255,255,255,0.13); border-radius: 18px;
    padding: 16px; width: 220px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    display: none; backdrop-filter: blur(24px);
  }
  #popup.open { display: block; }
  #popup-title { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; color: rgba(255,255,255,0.35); letter-spacing: 1px; text-align: center; margin-bottom: 12px; }
  .status-btn {
    width: 100%; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 700; padding: 11px 14px; cursor: pointer;
    margin-bottom: 7px; display: flex; align-items: center; gap: 9px;
    transition: transform 0.1s;
  }
  .status-btn:active { transform: scale(0.97); }
  .status-btn:last-child { margin-bottom: 0; }
  .btn-sold { background: #14532d; color: var(--green); }
  .btn-declined { background: #450a0a; color: var(--red); }
  .btn-noanswer { background: #451a03; color: var(--yellow); }
  .btn-delete { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); font-size: 0.8rem; justify-content: center; font-weight: 600; }
  .btn-cancel { background: transparent; color: rgba(255,255,255,0.2); font-size: 0.8rem; justify-content: center; font-weight: 500; border: 1px solid rgba(255,255,255,0.08); }

  /* LEGEND */
  #legend {
    position: fixed; top: 64px; right: 10px; z-index: 999;
    background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 11px 14px; backdrop-filter: blur(12px);
  }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.75rem; color: rgba(255,255,255,0.65); }
  .legend-row:last-child { margin-bottom: 0; }
  .ldot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
    background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3);
    color: var(--green); font-size: 0.78rem; font-weight: 600;
    padding: 7px 16px; border-radius: 20px; z-index: 1500;
    white-space: nowrap; pointer-events: none; transition: opacity 0.5s;
  }
  #toast.hidden { opacity: 0; }

  /* Override Leaflet z-index */
  .leaflet-top, .leaflet-bottom { z-index: 500 !important; }
  .leaflet-control-zoom { margin-top: 10px !important; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">⛸ GUTTER CREW</div>
  <input id="search-box" type="text" placeholder="Search street or neighbourhood...">
  <button id="search-btn" onclick="doSearch()">Go</button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LEGEND -->
<div id="legend">
  <div class="legend-row"><div class="ldot" style="background:#22c55e"></div> Sold</div>
  <div class="legend-row"><div class="ldot" style="background:#ef4444"></div> Declined</div>
  <div class="legend-row"><div class="ldot" style="background:#f59e0b"></div> No Answer</div>
  <div class="legend-row" style="font-size:0.65rem;color:rgba(255,255,255,0.25);margin-top:4px">Tap map · Tap pin to edit</div>
</div>

<!-- STATS BAR -->
<div id="statsbar">
  <div class="stat sold"><div class="num" id="cnt-sold">0</div><div class="lbl">💚 Sold</div></div>
  <div class="stat declined"><div class="num" id="cnt-declined">0</div><div class="lbl">🔴 Declined</div></div>
  <div class="stat noanswer"><div class="num" id="cnt-noanswer">0</div><div class="lbl">🟡 No Answer</div></div>
  <div class="stat total"><div class="num" id="cnt-total">0</div><div class="lbl">Total Knocked</div></div>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popup-title">MARK THIS DOOR</div>
  <button class="status-btn btn-sold" onclick="setStatus('sold')">💚 Sold — $200</button>
  <button class="status-btn btn-declined" onclick="setStatus('declined')">🔴 Declined</button>
  <button class="status-btn btn-noanswer" onclick="setStatus('noanswer')">🟡 No Answer</button>
  <button class="status-btn btn-delete" id="btn-delete" onclick="deletePin()" style="display:none">🗑 Remove Pin</button>
  <button class="status-btn btn-cancel" onclick="closePopup()">Cancel</button>
</div>

<!-- TOAST -->
<div id="toast" class="hidden"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── FIREBASE CONFIG ──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBEh-pxz6Swmq_gYWcQ9jzAwBrBWQU_wiI",
  authDomain: "door-knocking-tracker-499f1.firebaseapp.com",
  databaseURL: "https://door-knocking-tracker-499f1-default-rtdb.firebaseio.com",
  projectId: "door-knocking-tracker-499f1",
  storageBucket: "door-knocking-tracker-499f1.firebasestorage.app",
  messagingSenderId: "394791268239",
  appId: "1:394791268239:web:b29def6395408f912c25fa"
};

let map, db;
let markers = {}, pins = {};
let activePopupPin = null, pendingLatLng = null;

const PIN_COLORS = { sold: '#22c55e', declined: '#ef4444', noanswer: '#f59e0b' };

// ── MAKE PIN ICON ──
function makeIcon(status) {
  const color = PIN_COLORS[status] || '#94a3b8';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38" viewBox="0 0 30 38">
    <path d="M15 0C6.72 0 0 6.72 0 15c0 10 15 23 15 23S30 25 30 15C30 6.72 23.28 0 15 0z" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="6" fill="white" opacity="0.95"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [30, 38],
    iconAnchor: [15, 38],
    popupAnchor: [0, -38]
  });
}

// ── INIT MAP ──
map = L.map('map', {
  center: [49.8788, -97.1313],
  zoom: 16,
  zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 19
}).addTo(map);

// Tap map to drop pin
map.on('click', function(e) {
  closePopup();
  pendingLatLng = e.latlng;
  showPopupAtLatLng(e.latlng, null);
});

// Search on enter
document.getElementById('search-box').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

// ── FIREBASE ──
function loadScript(src, cb) {
  const s = document.createElement('script');
  s.src = src; s.onload = cb;
  document.head.appendChild(s);
}

loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js', function() {
  loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js', function() {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    listenToPins();
    showToast('Tap any house on the map to mark a door 📍', 3500);
  });
});

function listenToPins() {
  db.ref('pins').on('value', function(snap) {
    const data = snap.val() || {};
    // Remove deleted
    Object.keys(markers).forEach(id => {
      if (!data[id]) { map.removeLayer(markers[id]); delete markers[id]; delete pins[id]; }
    });
    // Add/update
    Object.entries(data).forEach(([id, pin]) => {
      pins[id] = pin;
      if (markers[id]) {
        markers[id].setIcon(makeIcon(pin.status));
      } else {
        addMarker(id, pin);
      }
    });
    updateStats();
  });
}

function addMarker(id, pin) {
  const m = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.status) }).addTo(map);
  m.on('click', function(e) {
    L.DomEvent.stopPropagation(e);
    pendingLatLng = null;
    activePopupPin = id;
    showPopupAtLatLng(L.latLng(pin.lat, pin.lng), id);
  });
  markers[id] = m;
}

function savePin(lat, lng, status) {
  db.ref('pins/pin_' + Date.now()).set({ lat, lng, status });
}
function updatePinStatus(id, status) { db.ref('pins/' + id + '/status').set(status); }
function removePin(id) { db.ref('pins/' + id).remove(); }

// ── POPUP ──
function showPopupAtLatLng(latlng, pinId) {
  activePopupPin = pinId;
  const point = map.latLngToContainerPoint(latlng);
  const popup = document.getElementById('popup');
  const popupW = 220, popupH = 260;
  const topbarH = 54;

  let x = point.x - popupW / 2;
  let y = point.y + topbarH - 40;

  // Keep within screen
  x = Math.max(8, Math.min(x, window.innerWidth - popupW - 8));
  y = Math.max(topbarH + 8, Math.min(y, window.innerHeight - popupH - 68));

  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  document.getElementById('popup-title').textContent = pinId ? 'UPDATE THIS DOOR' : 'MARK THIS DOOR';
  document.getElementById('btn-delete').style.display = pinId ? 'flex' : 'none';
  popup.classList.add('open');
}

function closePopup() {
  document.getElementById('popup').classList.remove('open');
  activePopupPin = null; pendingLatLng = null;
}

function setStatus(status) {
  if (activePopupPin) updatePinStatus(activePopupPin, status);
  else if (pendingLatLng) savePin(pendingLatLng.lat, pendingLatLng.lng, status);
  closePopup();
}

function deletePin() {
  if (activePopupPin) removePin(activePopupPin);
  closePopup();
}

// ── SEARCH ──
function doSearch() {
  const q = document.getElementById('search-box').value.trim();
  if (!q) return;
  const query = encodeURIComponent(q + ', Winnipeg, Manitoba, Canada');
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=1`)
    .then(r => r.json())
    .then(data => {
      if (data.length > 0) {
        map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 17);
      } else {
        // Try without Winnipeg
        const q2 = encodeURIComponent(q);
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q2}&limit=1`)
          .then(r => r.json())
          .then(d2 => { if (d2.length > 0) map.setView([parseFloat(d2[0].lat), parseFloat(d2[0].lon)], 17); });
      }
    });
}

// ── STATS ──
function updateStats() {
  let s = 0, d = 0, n = 0;
  Object.values(pins).forEach(p => {
    if (p.status === 'sold') s++;
    else if (p.status === 'declined') d++;
    else if (p.status === 'noanswer') n++;
  });
  document.getElementById('cnt-sold').textContent = s;
  document.getElementById('cnt-declined').textContent = d;
  document.getElementById('cnt-noanswer').textContent = n;
  document.getElementById('cnt-total').textContent = s + d + n;
}

// ── TOAST ──
function showToast(msg, ms) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), ms);
}

// Close popup on outside click
document.addEventListener('click', function(e) {
  const popup = document.getElementById('popup');
  if (popup.classList.contains('open') && !popup.contains(e.target)) closePopup();
});
</script>
</body>
</html>
