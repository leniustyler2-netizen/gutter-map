<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gutter Crew — Door Map</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --panel: rgba(15,23,42,0.96); --dark: #0f172a; }
  html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--dark); }
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: var(--panel); border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 10px 12px; display: flex; align-items: center; gap: 8px;
    backdrop-filter: blur(12px); height: 54px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--green); letter-spacing: 1.5px; white-space: nowrap; }
  #search-box {
    flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; padding: 8px 11px; outline: none;
  }
  #search-box::placeholder { color: rgba(255,255,255,0.35); }
  #search-btn {
    background: var(--green); border: none; border-radius: 8px; color: #0f172a;
    font-weight: 700; font-size: 0.85rem; padding: 8px 12px; cursor: pointer; white-space: nowrap;
  }
  #map { position: fixed; top: 54px; left: 0; right: 0; bottom: 60px; z-index: 1; }
  #statsbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: var(--panel); border-top: 1px solid rgba(255,255,255,0.08);
    padding: 8px 20px; display: flex; justify-content: space-around;
    backdrop-filter: blur(12px); height: 60px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
  .stat .num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; line-height: 1; }
  .stat .lbl { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.4px; color: rgba(255,255,255,0.3); }
  .stat.sold .num { color: var(--green); }
  .stat.declined .num { color: var(--red); }
  .stat.noanswer .num { color: var(--yellow); }
  .stat.total .num { color: rgba(255,255,255,0.6); }
  #popup {
    position: fixed; z-index: 3000; background: var(--panel);
    border: 1px solid rgba(255,255,255,0.13); border-radius: 18px;
    padding: 16px; width: 220px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    display: none; backdrop-filter: blur(24px);
  }
  #popup.open { display: block; }
  #popup-title { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; color: rgba(255,255,255,0.35); letter-spacing: 1px; text-align: center; margin-bottom: 12px; }
  .sbtn {
    width: 100%; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 700; padding: 11px 14px; cursor: pointer;
    margin-bottom: 7px; display: flex; align-items: center; gap: 9px;
  }
  .sbtn:last-child { margin-bottom: 0; }
  .b-sold { background: #14532d; color: var(--green); }
  .b-dec { background: #450a0a; color: var(--red); }
  .b-na { background: #451a03; color: var(--yellow); }
  .b-del { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); font-size: 0.8rem; justify-content: center; }
  .b-can { background: transparent; color: rgba(255,255,255,0.2); font-size: 0.8rem; justify-content: center; border: 1px solid rgba(255,255,255,0.08); }
  #legend {
    position: fixed; top: 64px; right: 10px; z-index: 999;
    background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 11px 14px; backdrop-filter: blur(12px);
  }
  .lr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.75rem; color: rgba(255,255,255,0.65); }
  .lr:last-child { margin-bottom: 0; }
  .ld { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  #status-bar {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
    background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3);
    color: var(--green); font-size: 0.78rem; font-weight: 600;
    padding: 7px 16px; border-radius: 20px; z-index: 1500;
    white-space: nowrap; pointer-events: none; transition: opacity 0.5s;
  }
  #status-bar.hide { opacity: 0; }
  .leaflet-top, .leaflet-bottom { z-index: 500 !important; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">⛸ GUTTER CREW</div>
  <input id="search-box" type="text" placeholder="Search street or neighbourhood...">
  <button id="search-btn" onclick="doSearch()">Go</button>
</div>

<div id="map"></div>

<div id="legend">
  <div class="lr"><div class="ld" style="background:#22c55e"></div> Sold</div>
  <div class="lr"><div class="ld" style="background:#ef4444"></div> Declined</div>
  <div class="lr"><div class="ld" style="background:#f59e0b"></div> No Answer</div>
  <div class="lr" style="font-size:0.65rem;color:rgba(255,255,255,0.25);margin-top:4px">Tap map to add pin</div>
</div>

<div id="statsbar">
  <div class="stat sold"><div class="num" id="cnt-sold">0</div><div class="lbl">💚 Sold</div></div>
  <div class="stat declined"><div class="num" id="cnt-declined">0</div><div class="lbl">🔴 Declined</div></div>
  <div class="stat noanswer"><div class="num" id="cnt-noanswer">0</div><div class="lbl">🟡 No Answer</div></div>
  <div class="stat total"><div class="num" id="cnt-total">0</div><div class="lbl">Total</div></div>
</div>

<div id="popup">
  <div id="popup-title">MARK THIS DOOR</div>
  <button class="sbtn b-sold" onclick="showPriceInput()">💚 Sold</button>
  <div id="price-input-row" style="display:none;margin-bottom:7px">
    <div style="display:flex;gap:6px;align-items:center">
      <span style="color:#22c55e;font-weight:700;font-size:1rem">$</span>
      <input id="price-val" type="number" placeholder="200" min="0"
        style="flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(34,197,94,0.4);border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;padding:8px 10px;outline:none;width:100%">
      <button onclick="confirmSold()" style="background:#22c55e;border:none;border-radius:8px;color:#0f172a;font-weight:700;padding:8px 12px;cursor:pointer;white-space:nowrap">✓ OK</button>
    </div>
  </div>
  <button class="sbtn b-dec" onclick="setStatus('declined')">🔴 Declined</button>
  <button class="sbtn b-na" onclick="setStatus('noanswer')">🟡 No Answer</button>
  <button class="sbtn b-del" id="btn-del" onclick="deletePin()" style="display:none">🗑 Remove Pin</button>
  <button class="sbtn b-can" onclick="closePopup()">Cancel</button>
</div>

<div id="status-bar" class="hide">Loading...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>

var FIREBASE_CONFIG = {
  apiKey: "AIzaSyBEh-pxz6Swmq_gYWcQ9jzAwBrBWQU_wiI",
  authDomain: "door-knocking-tracker-499f1.firebaseapp.com",
  databaseURL: "https://door-knocking-tracker-499f1-default-rtdb.firebaseio.com",
  projectId: "door-knocking-tracker-499f1",
  storageBucket: "door-knocking-tracker-499f1.firebasestorage.app",
  messagingSenderId: "394791268239",
  appId: "1:394791268239:web:b29def6395408f912c25fa"
};

firebase.initializeApp(FIREBASE_CONFIG);
var db = firebase.database();

var map = L.map('map', { center: [49.8951, -97.1384], zoom: 16 });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 19
}).addTo(map);

var markers = {}, pins = {};
var activePin = null, pendingLL = null;

var COLORS = { sold: '#22c55e', declined: '#ef4444', noanswer: '#f59e0b' };

function makeIcon(status) {
  var c = COLORS[status] || '#94a3b8';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38" viewBox="0 0 30 38">'
    + '<path d="M15 0C6.72 0 0 6.72 0 15c0 10 15 23 15 23S30 25 30 15C30 6.72 23.28 0 15 0z" fill="' + c + '" stroke="white" stroke-width="2"/>'
    + '<circle cx="15" cy="15" r="6" fill="white"/>'
    + '</svg>';
  return L.divIcon({ html: svg, className: '', iconSize: [30,38], iconAnchor: [15,38] });
}

function showPriceInput() {
  document.getElementById('price-input-row').style.display = 'block';
  document.getElementById('price-val').value = '200';
  document.getElementById('price-val').focus();
  document.getElementById('price-val').select();
}

function confirmSold() {
  var price = parseFloat(document.getElementById('price-val').value) || 200;
  document.getElementById('price-input-row').style.display = 'none';
  if (activePin) {
    db.ref('pins/' + activePin + '/status').set('sold');
    db.ref('pins/' + activePin + '/price').set(price);
  } else if (pendingLL) {
    var id = 'pin_' + Date.now();
    db.ref('pins/' + id).set({ lat: pendingLL.lat, lng: pendingLL.lng, status: 'sold', price: price });
  }
  closePopup();
}


  var el = document.getElementById('status-bar');
  el.textContent = msg;
  el.classList.remove('hide');
  setTimeout(function() { el.classList.add('hide'); }, 3000);
}

map.on('click', function(e) {
  pendingLL = e.latlng;
  activePin = null;
  openPopup(e.containerPoint, false);
});

// Fallback direct DOM listener
document.getElementById('map').addEventListener('click', function(e) {
  if (document.getElementById('popup').classList.contains('open')) return;
  var rect = document.getElementById('map').getBoundingClientRect();
  var containerPoint = L.point(e.clientX - rect.left, e.clientY - rect.top);
  var latlng = map.containerPointToLatLng(containerPoint);
  pendingLL = latlng;
  activePin = null;
  openPopup(containerPoint, false);
});

function openPopup(point, isExisting) {
  var popup = document.getElementById('popup');
  var w = 220, h = 250;
  var x = Math.min(Math.max(point.x - w/2, 8), window.innerWidth - w - 8);
  var y = Math.min(Math.max(point.y - h - 10, 62), window.innerHeight - h - 68);
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  document.getElementById('popup-title').textContent = isExisting ? 'UPDATE THIS DOOR' : 'MARK THIS DOOR';
  document.getElementById('btn-del').style.display = isExisting ? 'flex' : 'none';
  popup.classList.add('open');
}

function closePopup() {
  document.getElementById('popup').classList.remove('open');
  document.getElementById('price-input-row').style.display = 'none';
  activePin = null; pendingLL = null;
}

function setStatus(status) {
  if (activePin) {
    db.ref('pins/' + activePin + '/status').set(status);
  } else if (pendingLL) {
    var id = 'pin_' + Date.now();
    db.ref('pins/' + id).set({ lat: pendingLL.lat, lng: pendingLL.lng, status: status });
  }
  closePopup();
}

function deletePin() {
  if (activePin) db.ref('pins/' + activePin).remove();
  closePopup();
}

function addMarker(id, pin) {
  var m = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.status) }).addTo(map);
  m.on('click', function(e) {
    L.DomEvent.stopPropagation(e);
    activePin = id;
    pendingLL = null;
    openPopup(e.containerPoint, true);
  });
  markers[id] = m;
}

db.ref('pins').on('value', function(snap) {
  var data = snap.val() || {};
  Object.keys(markers).forEach(function(id) {
    if (!data[id]) { map.removeLayer(markers[id]); delete markers[id]; delete pins[id]; }
  });
  Object.keys(data).forEach(function(id) {
    pins[id] = data[id];
    if (markers[id]) {
      markers[id].setIcon(makeIcon(data[id].status));
    } else {
      addMarker(id, data[id]);
    }
  });
  var s=0,d=0,n=0;
  Object.values(pins).forEach(function(p) {
    if(p.status==='sold') s++;
    else if(p.status==='declined') d++;
    else if(p.status==='noanswer') n++;
  });
  document.getElementById('cnt-sold').textContent = s;
  document.getElementById('cnt-declined').textContent = d;
  document.getElementById('cnt-noanswer').textContent = n;
  document.getElementById('cnt-total').textContent = s+d+n;
});

document.getElementById('search-box').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  var q = document.getElementById('search-box').value.trim();
  if (!q) return;
  fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q + ', Winnipeg, Canada') + '&limit=1')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.length) { map.setView([parseFloat(d[0].lat), parseFloat(d[0].lon)], 17); }
    });
}

document.addEventListener('click', function(e) {
  var popup = document.getElementById('popup');
  if (popup.classList.contains('open') && !popup.contains(e.target)) closePopup();
});

showMsg('Tap any house on the map to mark a door 📍');

</script>
</body>
</html>
