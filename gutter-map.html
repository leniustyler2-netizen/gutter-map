<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gutter Crew — Door Map</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --gray: #94a3b8; --panel: rgba(15,23,42,0.97); --dark: #0f172a; }
  html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--dark); }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: var(--panel); border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 10px 12px; display: flex; align-items: center; gap: 8px; height: 54px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--green); letter-spacing: 1.5px; white-space: nowrap; }
  #search-box {
    flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.88rem; padding: 8px 11px; outline: none;
  }
  #search-box::placeholder { color: rgba(255,255,255,0.35); }
  #search-box:focus { border-color: var(--green); }
  #search-btn {
    background: var(--green); border: none; border-radius: 8px; color: #0f172a;
    font-weight: 700; font-size: 0.85rem; padding: 8px 14px; cursor: pointer; white-space: nowrap;
  }

  #map { position: fixed; top: 54px; left: 0; right: 0; bottom: 60px; z-index: 1; }

  #statsbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: var(--panel); border-top: 1px solid rgba(255,255,255,0.08);
    padding: 8px 20px; display: flex; justify-content: space-around; height: 60px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
  .stat .num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; line-height: 1; }
  .stat .lbl { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.4px; color: rgba(255,255,255,0.3); }
  .stat.sold .num { color: var(--green); }
  .stat.declined .num { color: var(--red); }
  .stat.noanswer .num { color: var(--yellow); }
  .stat.total .num { color: rgba(255,255,255,0.6); }

  /* POPUP - centered overlay */
  #overlay { position: fixed; inset: 0; z-index: 2500; background: rgba(0,0,0,0.5); display: none; }
  #overlay.open { display: block; }
  #popup {
    position: fixed; z-index: 3000; background: var(--panel);
    border: 1px solid rgba(255,255,255,0.13); border-radius: 18px;
    padding: 18px; width: 250px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    display: none; top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  #popup.open { display: block; }
  #popup-addr { font-size: 0.75rem; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 4px; }
  #popup-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: #fff; letter-spacing: 1px; text-align: center; margin-bottom: 14px; }
  .sbtn {
    width: 100%; border: none; border-radius: 10px; font-family: inherit;
    font-size: 0.9rem; font-weight: 700; padding: 12px 14px; cursor: pointer;
    margin-bottom: 8px; display: flex; align-items: center; gap: 9px;
  }
  .sbtn:last-child { margin-bottom: 0; }
  .b-sold { background: #14532d; color: var(--green); }
  .b-dec { background: #450a0a; color: var(--red); }
  .b-na { background: #451a03; color: var(--yellow); }
  .b-unset { background: rgba(255,255,255,0.06); color: var(--gray); }
  .b-can { background: transparent; color: rgba(255,255,255,0.25); font-size: 0.8rem; justify-content: center; border: 1px solid rgba(255,255,255,0.08); }

  #price-row { display: none; margin-bottom: 8px; }
  #price-row .inner { display: flex; gap: 6px; align-items: center; }
  #price-row .sym { color: var(--green); font-weight: 700; font-size: 1.1rem; }
  #price-val { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(34,197,94,0.4); border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.95rem; padding: 9px 10px; outline: none; }
  #b-confirm { background: var(--green); border: none; border-radius: 8px; color: #0f172a; font-weight: 700; padding: 9px 13px; cursor: pointer; font-size: 1rem; }

  #legend {
    position: fixed; top: 64px; right: 10px; z-index: 999;
    background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 11px 14px;
  }
  .lr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.75rem; color: rgba(255,255,255,0.65); }
  .lr:last-child { margin-bottom: 0; }
  .ld { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  #loading-msg {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7); font-size: 0.8rem; font-weight: 600;
    padding: 8px 18px; border-radius: 20px; z-index: 1500;
    white-space: nowrap; display: none;
  }

  .leaflet-top, .leaflet-bottom { z-index: 500 !important; }
  .status-tip {
    background: rgba(15,23,42,0.95) !important; border: 1px solid rgba(255,255,255,0.15) !important;
    color: #fff !important; font-family: 'DM Sans', sans-serif !important;
    font-weight: 700 !important; font-size: 0.8rem !important; border-radius: 8px !important;
    padding: 4px 10px !important; box-shadow: none !important;
  }
  .status-tip::before { display: none !important; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="topbar">
  <div class="logo">⛸ GUTTER</div>
  <input id="search-box" type="text" placeholder="Search a street e.g. Baie Mohawk...">
  <button id="search-btn">Load Street</button>
</div>

<div id="map"></div>

<div id="legend">
  <div class="lr"><div class="ld" style="background:#94a3b8"></div> Not knocked</div>
  <div class="lr"><div class="ld" style="background:#22c55e"></div> Sold</div>
  <div class="lr"><div class="ld" style="background:#ef4444"></div> Declined</div>
  <div class="lr"><div class="ld" style="background:#f59e0b"></div> No Answer</div>
</div>

<div id="statsbar">
  <div class="stat sold"><div class="num" id="cnt-sold">0</div><div class="lbl">💚 Sold</div></div>
  <div class="stat declined"><div class="num" id="cnt-declined">0</div><div class="lbl">🔴 Declined</div></div>
  <div class="stat noanswer"><div class="num" id="cnt-noanswer">0</div><div class="lbl">🟡 No Answer</div></div>
  <div class="stat total"><div class="num" id="cnt-total">0</div><div class="lbl">Total Knocked</div></div>
</div>

<div id="loading-msg">Loading houses...</div>

<!-- no popup needed - tap cycles status directly -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyBEh-pxz6Swmq_gYWcQ9jzAwBrBWQU_wiI",
  authDomain: "door-knocking-tracker-499f1.firebaseapp.com",
  databaseURL: "https://door-knocking-tracker-499f1-default-rtdb.firebaseio.com",
  projectId: "door-knocking-tracker-499f1",
  storageBucket: "door-knocking-tracker-499f1.firebasestorage.app",
  messagingSenderId: "394791268239",
  appId: "1:394791268239:web:b29def6395408f912c25fa"
};

firebase.initializeApp(FIREBASE_CONFIG);
var db = firebase.database();

var map = L.map('map', { center: [49.8951, -97.1384], zoom: 15 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

var markers = {};   // pinId -> leaflet marker
var pinData = {};   // pinId -> { lat, lng, status, address, price }
var activePin = null;

var COLORS = { sold: '#22c55e', declined: '#ef4444', noanswer: '#f59e0b', unknown: '#94a3b8' };

function makeIcon(status) {
  var c = COLORS[status] || COLORS.unknown;
  var size = status === 'unknown' ? 22 : 28;
  var offset = size / 2;
  return L.divIcon({
    html: '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + (size*1.27) + '" viewBox="0 0 30 38"><path d="M15 0C6.72 0 0 6.72 0 15c0 10 15 23 15 23S30 25 30 15C30 6.72 23.28 0 15 0z" fill="' + c + '" stroke="white" stroke-width="2.5"/><circle cx="15" cy="15" r="6" fill="white" opacity="0.9"/></svg>',
    className: '', iconSize: [size, size*1.27], iconAnchor: [offset, size*1.27]
  });
}

// ── FIREBASE SYNC ──
db.ref('pins').on('value', function(snap) {
  var data = snap.val() || {};
  // Update existing markers from DB
  Object.keys(data).forEach(function(id) {
    pinData[id] = data[id];
    if (markers[id]) {
      markers[id].setIcon(makeIcon(data[id].status));
    }
  });
  updateStats();
});

// ── LOAD HOUSES ON A STREET ──
function loadStreet() {
  var q = document.getElementById('search-box').value.trim();
  if (!q) return;
  var msg = document.getElementById('loading-msg');
  msg.style.display = 'block';
  msg.textContent = 'Loading houses on ' + q + '...';

  // Search for all house numbers on this street using Nominatim
  var overpassQuery = '[out:json][timeout:30];(node["addr:street"~"' + q + '","i"]["addr:housenumber"](49.75,-97.35,49.95,-96.95);way["addr:street"~"' + q + '","i"]["addr:housenumber"](49.75,-97.35,49.95,-96.95););out center qt;';

  fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(overpassQuery))
  .then(function(r) {
    if (!r.ok) throw new Error('Network error');
    return r.json();
  })
  .then(function(data) {
    msg.style.display = 'none';
    if (!data.elements || data.elements.length === 0) {
      msg.style.display = 'block';
      msg.textContent = 'No houses found. Try the full street name e.g. "Baie Mohawk Bay"';
      setTimeout(function() { msg.style.display = 'none'; }, 4000);
      return;
    }

    var bounds = [];
    data.elements.forEach(function(el) {
      var lat = el.lat || (el.center && el.center.lat);
      var lng = el.lon || (el.center && el.center.lon);
      if (!lat || !lng) return;

      var addr = (el.tags['addr:housenumber'] || '') + ' ' + (el.tags['addr:street'] || q);
      addr = addr.trim();
      var id = 'h_' + lat.toFixed(6) + '_' + lng.toFixed(6);

      bounds.push([lat, lng]);

      if (!markers[id]) {
        var status = (pinData[id] && pinData[id].status) || 'unknown';
        pinData[id] = pinData[id] || { lat: lat, lng: lng, status: status, address: addr };

        var m = L.marker([lat, lng], { icon: makeIcon(status) }).addTo(map);
        m._pinId = id;
        m.on('click', function(e) {
          L.DomEvent.stopPropagation(e);
          cycleStatus(this._pinId);
        });
        markers[id] = m;
      }
    });

    if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40] });

    msg.style.display = 'block';
    msg.textContent = '✓ ' + data.elements.length + ' houses loaded on ' + q;
    setTimeout(function() { msg.style.display = 'none'; }, 3000);
  })
  .catch(function(err) {
    console.error(err);
    msg.style.display = 'block';
    msg.textContent = 'Error loading street. Check your connection and try again.';
    setTimeout(function() { msg.style.display = 'none'; }, 4000);
  });
}

var CYCLE = ['unknown', 'noanswer', 'declined', 'sold'];
var CYCLE_LABELS = { unknown: 'Not Knocked', noanswer: 'No Answer', declined: 'Declined', sold: 'Sold' };

function cycleStatus(id) {
  var current = (pinData[id] && pinData[id].status) || 'unknown';
  var idx = CYCLE.indexOf(current);
  var next = CYCLE[(idx + 1) % CYCLE.length];

  pinData[id].status = next;
  markers[id].setIcon(makeIcon(next));

  // If sold, ask for price
  if (next === 'sold') {
    var price = prompt('Sale price? (default $200)', '200');
    price = parseFloat(price) || 200;
    pinData[id].price = price;
    db.ref('pins/' + id).set({
      lat: pinData[id].lat, lng: pinData[id].lng,
      address: pinData[id].address || '', status: next, price: price
    });
  } else {
    db.ref('pins/' + id).set({
      lat: pinData[id].lat, lng: pinData[id].lng,
      address: pinData[id].address || '', status: next
    });
  }

  showLabel(id, next);
  updateStats();
}

function showLabel(id, status) {
  var m = markers[id];
  if (!m) return;
  m.unbindTooltip();
  if (status !== 'unknown') {
    m.bindTooltip(CYCLE_LABELS[status], {
      permanent: false, direction: 'top', className: 'status-tip'
    }).openTooltip();
    setTimeout(function() { if (markers[id]) markers[id].closeTooltip(); }, 1500);
  }
}

function saveStatus(status, price) {
  if (!activePin) return;
  var update = {
    lat: pinData[activePin].lat, lng: pinData[activePin].lng,
    address: pinData[activePin].address || '', status: status
  };
  if (price !== undefined) update.price = price;
  db.ref('pins/' + activePin).set(update);
  pinData[activePin].status = status;
  markers[activePin].setIcon(makeIcon(status));
  updateStats();
  closePopup();
}

function closePopup() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('popup').classList.remove('open');
  document.getElementById('price-row').style.display = 'none';
  activePin = null;
}

function updateStats() {
  var s=0, d=0, n=0, total=0;
  Object.values(pinData).forEach(function(p) {
    if (p.status === 'sold') { s++; total++; }
    else if (p.status === 'declined') { d++; total++; }
    else if (p.status === 'noanswer') { n++; total++; }
  });
  document.getElementById('cnt-sold').textContent = s;
  document.getElementById('cnt-declined').textContent = d;
  document.getElementById('cnt-noanswer').textContent = n;
  document.getElementById('cnt-total').textContent = total;
}

// ── BINDINGS ──
document.getElementById('search-btn').onclick = loadStreet;
document.getElementById('search-box').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadStreet();
});
</script>
</body>
</html>
